<section class="mx-auto w-full max-w-3xl px-4 py-6">
  <a routerLink="/" class="mb-6 inline-block text-sm font-medium text-blue-600 hover:underline">
    ←
  </a>

  @if (isLoading()) {
    <p class="text-center text-slate-600">Cargando detalle...</p>
  } @else if (hasError() || !pokemon()) {
    <p class="text-center text-red-600">No se pudo cargar el detalle del Pokemon.</p>
  } @else {
    <div class="flex items-center justify-between gap-2">
      <h2 class="text-center text-2xl font-bold capitalize text-[#204438]">
        #{{ pokemon()!.id }}
      </h2>
      <h2 class="text-center text-2xl font-bold capitalize text-[#204438]">
        {{ pokemon()!.name }}
      </h2>
    </div>
    <article class="bg-gradient-to-b from-[#264A81] to-[#478FB3] rounded-lg">
      <img
        [src]="pokemon()!.image || 'assets/img/logo.svg'"
        [alt]="pokemon()!.name"
        class="mx-auto mb-4 h-40 w-40 object-contain"
      />
    </article>
    <!-- <div class="mt-4 grid grid-cols-2 gap-3 text-sm">
      <p class="rounded-md bg-slate-100 p-2"><strong>Altura:</strong> {{ pokemon()!.height }}</p>
      <p class="rounded-md bg-slate-100 p-2"><strong>Peso:</strong> {{ pokemon()!.weight }}</p>
    </div> -->
    <div class="mt-4">
      <div class="flex flex-wrap gap-2 justify-center">
        @for (type of pokemon()!.types; track type) {
          <span
            class="w-[164px] text-center rounded-md px-3 py-1 text-md font-bold capitalize text-white shadow-[0px_4px_16px_rgba(17,17,26,0.1),0px_8px_24px_rgba(17,17,26,0.1),0px_16px_56px_rgba(17,17,26,0.1)]"
            [style.backgroundColor]="getTypeColor(type)"
          >
            {{ type }}
          </span>
        }
      </div>
    </div>
  }
</section>
