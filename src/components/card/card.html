@if (pokemon) {
    <a
        class="block rounded-lg border border-slate-200 bg-white p-3 text-center shadow-sm transition hover:-translate-y-0.5 hover:shadow-md"
        [routerLink]="['/pokemon', pokemon.id]"
        >
        <img
            [src]="pokemon.image || 'assets/img/logo.svg'"
            [alt]="pokemon.name"
            class="mx-auto mb-2 h-20 w-20 object-contain"
        />
        <p class="font-semibold capitalize text-slate-800">{{ pokemon.name }}</p>
        <p class="text-xs text-slate-500">#{{ pokemon.id }}</p>
    </a>
}
